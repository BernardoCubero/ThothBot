version: "3.1"

# Intenciones
intents:
  - saludo
  - despedida
  - buscar_monumentos
  - info_monumento
  - buscar_eventos
  - consultar_entradas
  - recomendar_planes
  - consultar_ciudad
  - bot_challenge
  - informar_datos

# Datos Frases

entities:
  - ciudad
  - monumento
  - evento
  - fecha
  - nombre
  - ciudad_origen
  - pais

#Contexto

slots:
  ciudad:
    type: text
    mappings:
      - type: from_entity
        entity: ciudad
  monumento:
    type: text
    mappings:
      - type: from_entity
        entity: monumento
  fecha:
    type: text
    mappings:
      - type: from_entity
        entity: fecha
  es_usuario_nuevo:
    type: bool
    mappings:
      - type: custom
  nombre:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: usuario_form
            requested_slot: nombre
        not_intent:
          - buscar_monumentos
          - info_monumento
          - buscar_eventos
          - recomendar_planes
  ciudad_origen:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: usuario_form
            requested_slot: ciudad_origen
        not_intent:
          - buscar_monumentos
          - info_monumento
          - buscar_eventos
          - recomendar_planes
  pais:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: usuario_form
            requested_slot: pais
        not_intent:
          - buscar_monumentos
          - info_monumento
          - buscar_eventos
          - recomendar_planes

forms:
  usuario_form:
    required_slots:
      - nombre
      - ciudad_origen
      - pais



responses:
  utter_saludo:
    - text: "Hola, soy Thothbot, Puedo ayudarte a descrubrir monumentos, eventos y actividades en la Ciudad que tu Elijas"

  utter_saludo_en:
    - text: "Hello, I'm Thothbot. I can help you discover monuments, events and activities in many cities."

  utter_despedida:
    - text: "¡Que tengas un buen viaje!"

  utter_pedir_ciudad:
    - text: "¿En qué ciudad estás interesado?"


#Acciones que usaran las Apis

actions:

  - action_buscar_monumentos
  - action_info_monumento
  - action_buscar_eventos
  - action_consultar_entradas
  - action_recomendar_planes
  - action_registrar_usuario
  - action_saludo_personalizado
  - action_ask_nombre
  - action_ask_ciudad_origen
  - action_ask_pais
  - action_bot_challenge

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: false
