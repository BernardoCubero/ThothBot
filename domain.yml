version: "3.1"

# Intenciones
intents:
  - saludo
  - despedida
  - buscar_monumentos
  - info_monumento
  - buscar_eventos
  - consultar_entradas
  - recomendar_planes
  - consultar_ciudad

# Datos Frases

entities:
  - ciudad
  - monumento
  - evento
  - fecha

#Contexto

slots:
  ciudad:
    type: text
    mappings:
      - type: from_entity
        entity: ciudad
  monumento:
    type: text
    mappings:
      - type: from_entity
        entity: monumento
  fecha:
    type: text
    mappings:
      - type: from_entity
        entity: fecha



responses:
  utter_saludo:
    - text: "Hola, soy Thothbot, Puedo ayudarte a descrubrir monumentos, eventos y actividades en la Ciudad que tu Elijas"

  utter_saludo_en:
    - text: "Hello, I'm Thothbot. I can help you discover monuments, events and activities in many cities."

  utter_despedida:
    - text: "¡Que tengas un buen viaje!"

  utter_pedir_ciudad:
    - text: "¿En qué ciudad estás interesado?"


#Acciones que usaran las Apis

actions:

  - action_buscar_monumentos
  - action_info_monumento
  - action_buscar_eventos
  - action_consultar_entradas
  - action_recomendar_planes

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: false
