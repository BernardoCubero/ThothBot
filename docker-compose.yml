services:
  # Motor principal de Rasa
  rasa:
    image: adsl7700/thothbot-rasa:latest
    container_name: thothbot-rasa
    ports:
      - "5005:5005"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./credentials.yml:/app/credentials.yml
      - ./config.yml:/app/config.yml
      - ./domain.yml:/app/domain.yml
      - ./data:/app/data
      - ./endpoints.yml:/app/endpoints.yml
    restart: always
    depends_on:
      - action_server
      - db
    networks:
      - thothbot-net

  # Proxy de Telegram → Rasa (evita bug del canal nativo de Rasa 3.6.x)
  telegram_proxy:
    build:
      context: ./telegram_proxy
      dockerfile: Dockerfile
    container_name: thothbot-telegram
    restart: "no"
    env_file:
      - .env
    environment:
      - RASA_URL=http://rasa:5005/webhooks/rest/webhook
    depends_on:
      - rasa
    networks:
      - thothbot-net

  # Servidor de acciones personalizadas
  action_server:
    image: adsl7700/thothbot-actions:latest
    container_name: thothbot-actions
    ports:
      - "5055:5055"
    volumes:
      # Montamos carpetas de código para hot-reload sin romper el contenedor
      - ./actions:/app/actions
      - ./database:/app/database
      - ./services:/app/services
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - MONGO_HOST=mongodb
      - MARIADB_HOST=db
    restart: always
    depends_on:
      - db
      - mongodb
    networks:
      - thothbot-net

  # Base de datos relacional (Usuarios)
  db:
    image: mariadb:10.6
    container_name: thothbot-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DB}
    ports:
      - "127.0.0.1:3307:3306" # Habilitado por seguridad: Aislamiento total de red externa, accesible solo vía Localhost / SSH Tunnel.
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - thothbot-net

  # Base de datos NoSQL (Logs de conversaciones)
  mongodb:
    image: mongo:latest
    container_name: thothbot-mongodb
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - thothbot-net

volumes:
  mariadb_data:
  mongodb_data:

networks:
  thothbot-net:
    driver: bridge
